<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>LuaGen WebWorld</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100dvh;
      touch-action: none;
    }

    #world {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    /* ── Load screen ── */
    #load-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      background: #0d0d0d;
      font-size: 1.2rem;
      color: #aaa;
      z-index: 100;
    }
    #load-screen::before {
      content: 'LuaGen';
      font-size: 3rem;
      font-weight: 900;
      color: #e94560;
      letter-spacing: 4px;
    }

    /* ── HUD ── */
    #hud {
      display: none;
      position: absolute;
      inset: 0;
      pointer-events: none;
      flex-direction: column;
      align-items: flex-start;
    }

    #topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }
    #world-name { font-size: 1rem; font-weight: 700; color: #e94560; letter-spacing: 1px; }
    #player-count { font-size: 0.8rem; color: #aaa; }

    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      opacity: 0.8;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { height: 2px; width: 100%; top: 50%;  transform: translateY(-50%); }
    .touch-active #crosshair { display: none; }

    /* Chat */
    #chat-area {
      position: absolute;
      bottom: 16px; left: 16px;
      width: min(380px, calc(100vw - 32px));
    }
    #chat-log {
      max-height: 130px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 3px;
      scrollbar-width: none;
    }
    .chat-line {
      font-size: 0.82rem; color: #ddd;
      background: rgba(0,0,0,0.4);
      padding: 3px 8px; border-radius: 4px;
      backdrop-filter: blur(4px);
      word-break: break-word;
    }
    #chat-input {
      display: none;
      width: 100%; margin-top: 6px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(233,69,96,0.5);
      border-radius: 6px; color: #fff;
      font-size: 0.85rem; outline: none;
      pointer-events: all;
      backdrop-filter: blur(8px);
    }
    #chat-input:focus { border-color: #e94560; }

    #controls-hint {
      position: absolute;
      bottom: 16px; right: 16px;
      text-align: right;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.35);
      line-height: 1.8;
    }
    .touch-active #controls-hint { display: none; }

    #watermark {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: rgba(255,255,255,0.15);
      letter-spacing: 3px; font-weight: 700;
    }

    /* ── Portal fade ── */
    #fade {
      position: absolute; inset: 0;
      background: #000; opacity: 0;
      pointer-events: none; z-index: 50;
    }

    /* ── Pause menu ── */
    #pause-menu {
      display: none;
      position: absolute; inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      align-items: center; justify-content: center;
      z-index: 40;
    }
    #pause-menu.open { display: flex; }

    #pause-card {
      background: rgba(13,13,30,0.95);
      border: 1px solid rgba(233,69,96,0.3);
      border-radius: 16px;
      padding: 32px 36px;
      min-width: 300px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 0 60px rgba(233,69,96,0.15);
    }

    #pause-card h2 {
      font-size: 1.4rem;
      color: #e94560;
      letter-spacing: 1px;
      text-align: center;
    }

    #pause-card .sub {
      text-align: center;
      font-size: 0.8rem;
      color: #555;
      margin-top: -12px;
    }

    .pause-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .pause-btn:hover, .pause-btn:active {
      background: rgba(233,69,96,0.2);
      border-color: rgba(233,69,96,0.5);
    }
    .pause-btn.danger {
      border-color: rgba(233,69,96,0.3);
      color: #e94560;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.85rem;
      color: #aaa;
    }
    .setting-row input[type=range] {
      flex: 1;
      accent-color: #e94560;
      cursor: pointer;
    }
    .setting-row span { min-width: 2.5ch; text-align: right; color: #e94560; font-size: 0.8rem; }

    #pause-controls-hint {
      font-size: 0.72rem;
      color: #444;
      text-align: center;
      line-height: 1.8;
    }

    /* ── Touch UI ── */
    #touch-ui {
      display: none;
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .touch-active #touch-ui { display: block; }

    /* Virtual joystick */
    #joystick-base {
      position: absolute;
      width: 110px; height: 110px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.15);
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
    }
    #joystick-base.active { opacity: 1; }
    #joystick-nub {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(233,69,96,0.7);
      border: 2px solid rgba(233,69,96,0.9);
      pointer-events: none;
    }

    /* Touch buttons */
    .touch-btn {
      position: absolute;
      pointer-events: all;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.8);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      user-select: none;
      cursor: pointer;
      transition: background 0.1s;
    }
    .touch-btn:active { background: rgba(233,69,96,0.35); }

    #btn-jump {
      width: 72px; height: 72px;
      bottom: 28px; right: 24px;
      font-size: 1.5rem;
    }
    #btn-sprint-touch {
      width: 52px; height: 52px;
      bottom: 108px; right: 32px;
      font-size: 1rem;
    }
    #btn-chat-touch {
      width: 48px; height: 48px;
      bottom: 28px; right: 108px;
      font-size: 1rem;
    }
    #btn-menu-touch {
      width: 44px; height: 44px;
      top: 12px; right: 16px;
      font-size: 1rem;
      border-radius: 10px;
      pointer-events: all;
    }

    /* Left joystick touch zone — invisible but captures touches */
    #joystick-zone {
      position: absolute;
      left: 0; top: 0;
      width: 50%; height: 100%;
      pointer-events: all;
    }
    /* Right look zone */
    #look-zone {
      position: absolute;
      right: 0; top: 0;
      width: 50%; height: 100%;
      pointer-events: all;
    }
  </style>
</head>
<body>
  <canvas id="world"></canvas>
  <div id="fade"></div>

  <div id="load-screen">Loading world...</div>

  <!-- Pause menu -->
  <div id="pause-menu">
    <div id="pause-card">
      <h2 id="pause-world-name">WebWorld</h2>
      <div class="sub" id="pause-player-count">1 player</div>

      <button class="pause-btn" id="btn-resume">Resume</button>

      <div class="setting-row">
        <label for="sensitivity">Sensitivity</label>
        <input type="range" id="sensitivity" min="0.3" max="4" step="0.1" value="1">
        <span id="sens-val">1.0</span>
      </div>

      <div class="setting-row">
        <label for="fov-slider">FOV</label>
        <input type="range" id="fov-slider" min="60" max="110" step="1" value="75">
        <span id="fov-val">75</span>
      </div>

      <button class="pause-btn danger" id="btn-leave">Leave to Hub</button>

      <div id="pause-controls-hint">
        WASD Move &nbsp;·&nbsp; Space Jump &nbsp;·&nbsp; Shift Sprint<br>
        T Chat &nbsp;·&nbsp; Q / Esc Pause menu
      </div>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="topbar">
      <span id="world-name">WebWorld</span>
      <span id="player-count">...</span>
    </div>
    <div id="watermark">LUAGEN</div>
    <div id="crosshair"></div>
    <div id="chat-area">
      <div id="chat-log"></div>
      <input id="chat-input" type="text" placeholder="Say something… (Enter to send, Esc to cancel)" maxlength="256">
    </div>
    <div id="controls-hint">
      WASD Move &nbsp; Space Jump<br>
      Shift Sprint &nbsp; T Chat &nbsp; Q Pause
    </div>
  </div>

  <!-- Touch UI (shown only on touch devices) -->
  <div id="touch-ui">
    <div id="joystick-zone"></div>
    <div id="look-zone"></div>
    <div id="joystick-base"><div id="joystick-nub"></div></div>
    <button class="touch-btn" id="btn-jump">&#x2191;</button>
    <button class="touch-btn" id="btn-sprint-touch">&#x23E9;</button>
    <button class="touch-btn" id="btn-chat-touch">&#x1F4AC;</button>
    <button class="touch-btn" id="btn-menu-touch">&#x2630;</button>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
