<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LuaGen Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d; color: #ccc;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
    }

    /* ── Toolbar ── */
    #toolbar {
      height: 42px;
      background: #161620;
      border-bottom: 1px solid #2a2a3a;
      display: flex; align-items: center;
      gap: 6px; padding: 0 12px;
      flex-shrink: 0;
    }
    #toolbar .logo { color: #e94560; font-weight: 900; letter-spacing: 2px; font-size: 14px; margin-right: 8px; }
    #toolbar .sep { width: 1px; height: 24px; background: #2a2a3a; margin: 0 4px; }
    .tb-btn {
      padding: 5px 12px; border-radius: 5px;
      border: 1px solid #2a2a3a;
      background: #1e1e2e; color: #ccc;
      cursor: pointer; font-size: 12px;
      transition: background 0.12s, border-color 0.12s;
    }
    .tb-btn:hover { background: #2a2a3e; border-color: #444; }
    .tb-btn.primary { background: #e94560; border-color: #e94560; color: #fff; }
    .tb-btn.primary:hover { background: #c73850; }
    .tb-btn.active { background: #533483; border-color: #7744bb; color: #fff; }
    #world-selector { background: #1e1e2e; border: 1px solid #2a2a3a; color: #ccc; padding: 4px 8px; border-radius: 5px; font-size: 12px; }
    #status-bar { margin-left: auto; font-size: 11px; color: #555; }
    #status-bar span { color: #00ffcc; }

    /* ── Main layout ── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left panel: object list ── */
    #panel-left {
      width: 200px; flex-shrink: 0;
      background: #111118;
      border-right: 1px solid #1e1e2e;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 8px 12px;
      background: #161620;
      border-bottom: 1px solid #1e1e2e;
      font-size: 11px; font-weight: 700;
      color: #555; letter-spacing: 1px; text-transform: uppercase;
    }
    #object-list {
      flex: 1; overflow-y: auto;
      scrollbar-width: thin; scrollbar-color: #2a2a3a transparent;
    }
    .obj-item {
      padding: 7px 12px;
      cursor: pointer;
      border-bottom: 1px solid #16161e;
      display: flex; align-items: center; gap: 8px;
      transition: background 0.1s;
    }
    .obj-item:hover { background: #1a1a28; }
    .obj-item.selected { background: #1e1830; border-left: 2px solid #e94560; }
    .obj-type-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .obj-id { font-size: 12px; color: #aaa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .obj-type-label { font-size: 10px; color: #555; margin-left: auto; flex-shrink: 0; }

    #add-buttons { padding: 8px; display: flex; flex-direction: column; gap: 4px; border-top: 1px solid #1e1e2e; }
    .add-btn {
      padding: 6px 10px; border-radius: 4px;
      border: 1px solid #2a2a3a;
      background: #1a1a28; color: #888;
      cursor: pointer; font-size: 11px; text-align: left;
      transition: all 0.1s;
    }
    .add-btn:hover { background: #232336; color: #ccc; border-color: #444; }

    /* ── Viewport ── */
    #viewport { flex: 1; position: relative; overflow: hidden; }
    #builder-canvas { display: block; width: 100%; height: 100%; }
    #viewport-hint {
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(255,255,255,0.25);
      pointer-events: none; white-space: nowrap;
    }
    #selection-info {
      position: absolute; top: 12px; left: 12px;
      font-size: 11px; color: rgba(255,255,255,0.4);
      pointer-events: none;
    }

    /* ── Right panel: properties ── */
    #panel-right {
      width: 220px; flex-shrink: 0;
      background: #111118;
      border-left: 1px solid #1e1e2e;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    #props-content {
      flex: 1; overflow-y: auto; padding: 10px;
      scrollbar-width: thin; scrollbar-color: #2a2a3a transparent;
    }
    .prop-group {
      margin-bottom: 14px;
    }
    .prop-group-label {
      font-size: 10px; color: #444; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 6px; font-weight: 700;
    }
    .prop-row {
      display: flex; align-items: center;
      margin-bottom: 5px; gap: 6px;
    }
    .prop-label {
      width: 36px; font-size: 11px; color: #555; flex-shrink: 0;
    }
    .prop-input {
      flex: 1; background: #1a1a28; border: 1px solid #2a2a3a;
      color: #ddd; padding: 4px 7px; border-radius: 4px;
      font-size: 12px; outline: none;
      transition: border-color 0.1s;
    }
    .prop-input:focus { border-color: #e94560; }
    .prop-input[type=color] { padding: 1px 3px; height: 26px; cursor: pointer; }
    .prop-checkbox { accent-color: #e94560; cursor: pointer; }
    .prop-full { width: 100%; }
    .delete-btn {
      width: 100%; padding: 7px; margin-top: 8px;
      background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.3);
      color: #e94560; border-radius: 5px; cursor: pointer; font-size: 12px;
      transition: all 0.1s;
    }
    .delete-btn:hover { background: rgba(233,69,96,0.25); }
    #no-selection {
      padding: 20px 12px; color: #333; font-size: 12px; text-align: center; line-height: 1.8;
    }

    /* ── World settings (bottom) ── */
    #world-settings {
      border-top: 1px solid #1e1e2e;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .ws-row { display: flex; align-items: center; gap: 6px; }
    .ws-label { font-size: 11px; color: #555; width: 56px; flex-shrink: 0; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div class="logo">LUAGEN</div>
  <div class="sep"></div>
  <select id="world-selector"></select>
  <button class="tb-btn" id="btn-reload">↺ Reload</button>
  <div class="sep"></div>
  <button class="tb-btn" id="btn-new-world">+ New World</button>
  <div class="sep"></div>
  <button class="tb-btn primary" id="btn-save">💾 Save</button>
  <div id="status-bar">Click object to select &nbsp;·&nbsp; Right-drag to look &nbsp;·&nbsp; WASD to fly &nbsp;·&nbsp; <span id="save-status">unsaved</span></div>
</div>

<!-- Main -->
<div id="main">

  <!-- Left: object list -->
  <div id="panel-left">
    <div class="panel-header">Objects</div>
    <div id="object-list"></div>
    <div id="add-buttons">
      <button class="add-btn" data-type="box">+ Box</button>
      <button class="add-btn" data-type="sphere">+ Sphere</button>
      <button class="add-btn" data-type="portal">+ Portal</button>
      <button class="add-btn" data-type="panel">+ UI Panel</button>
    </div>
  </div>

  <!-- Viewport -->
  <div id="viewport">
    <canvas id="builder-canvas"></canvas>
    <div id="viewport-hint">Right-drag to look · WASD fly · Scroll zoom · Click to select</div>
    <div id="selection-info"></div>
  </div>

  <!-- Right: properties -->
  <div id="panel-right">
    <div class="panel-header">Properties</div>
    <div id="props-content">
      <div id="no-selection">Click an object<br>to edit its properties</div>
    </div>
    <div id="world-settings">
      <div class="panel-header" style="padding:0;margin-bottom:6px">World Settings</div>
      <div class="ws-row">
        <span class="ws-label">Sky</span>
        <input type="color" class="prop-input" id="ws-sky" value="#1a1a2e">
        <span class="ws-label">Fog</span>
        <input type="color" class="prop-input" id="ws-fog" value="#1a1a2e">
      </div>
      <div class="ws-row">
        <span class="ws-label">Gravity</span>
        <input type="number" class="prop-input" id="ws-gravity" value="-20" step="1">
      </div>
      <div class="ws-row">
        <span class="ws-label">Spawn X</span>
        <input type="number" class="prop-input" id="ws-sx" value="0" step="0.5">
        <span class="ws-label">Z</span>
        <input type="number" class="prop-input" id="ws-sz" value="0" step="0.5">
      </div>
    </div>
  </div>

</div>

<script type="module" src="/builder/builder.js"></script>
</body>
</html>
